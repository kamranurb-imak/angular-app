<h1>Template Driven Form</h1>

<form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)">
    <div class="formDiv">
        <label for="userName">Name:</label>
        <input type="text" id="name" name="name" ngModel required>
    </div>

    <div class="formDiv">
        <label for="userPassword">Password:</label>
        <input type="password" id="password" name="password" ngModel required minlength="5">
    </div>

    <div class="formDiv">
        <label for="gender">Gender:</label>
        <select id="gender" name="gender" ngModel required>
            <option value="" selected>Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>

    <div class="formDiv">
        <label for="age">Age:</label>
        <input type="range" id="age" name="age" ngModel min="18" max="35">
    </div>

    <div class="formDiv">
        <label for="terms">Accept Terms:</label>
        <input type="checkbox" id="terms" name="terms" ngModel required>
    </div>

    <div class="formDiv">
        <button type="submit" [disabled]="!userForm.valid">Add User</button>
    </div>
</form>
