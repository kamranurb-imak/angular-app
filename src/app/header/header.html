<div class="header">
     <div class="row mx-1">
          <div class="col-md-1 flex flex-column">
               <a routerLink="/login" routerLinkActive="active" title="Logout" (click)="setLoginProps();">Logout</a>
          </div>
          <div class="col-md-11 flex flex-column">
               <ul class="flex flex-column">
                    <li><a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
                    </li>
                    <li><a routerLink="/counter" routerLinkActive="active"
                              title="Increment and decrement a counter">Counter</a></li>
                    <li><a routerLink="/todo-list" routerLinkActive="active" title="Manage a list of todo items">Todo
                              List</a></li>
                    <li><a routerLink="/reactive-form" routerLinkActive="active"
                              title="Create forms using reactive approach">Reactive Form</a></li>
                    <li><a routerLink="/template-driven-form" routerLinkActive="active"
                              title="Create forms using template-driven approach">Template Driven Form</a></li>
                    <li><a routerLink="/profile" routerLinkActive="active" title="View and edit user profile">Profile</a>
                    </li>
                    <li><a routerLink="/users" routerLinkActive="active"
                              title="Pass data between parent and child components">Users</a></li>
                    <li><a routerLink="/pipes" routerLinkActive="active" title="Transform data for display">Pipes</a></li>
                    <li><a routerLink="/inventory" routerLinkActive="active" title="Load data from database">Inventory</a>
                    </li>
                    <li><a routerLink="/life-cycle-hooks" routerLinkActive="active"
                              title="Demonstrate Angular life cycle methods">Life Cycle Hooks</a></li>
               </ul>
          </div>
     </div>
</div>
